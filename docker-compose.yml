version: '3.8'

services:
  nous:
    build: .
    image: nous:latest
    container_name: nous
    ports:
      - "26263:26263"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      - ./.env:/app/.env:ro
    environment:
      - NOUS_DATA_DIR=/app/data
      - PERSONA=herta
      - TZ=Asia/Tokyo
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - nous-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nous-qdrant
    ports:
      - "6334:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - nous-network

networks:
  nous-network:
    driver: bridge
